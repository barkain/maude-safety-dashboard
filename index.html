<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FDA MAUDE Device Reliability Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --text: #e8eaf0;
      --text-muted: #7c8099;
      --accent: #4f8ef7;
      --red: #ef4444;
      --yellow: #f59e0b;
      --green: #22c55e;
      --orange: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    /* Header */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
    header span.badge { background: var(--accent); color: white; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; letter-spacing: 0.5px; text-transform: uppercase; }
    .header-meta { margin-left: auto; color: var(--text-muted); font-size: 12px; }

    /* Layout */
    .app { display: flex; height: calc(100vh - 57px); }
    .sidebar { width: 360px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .main { flex: 1; overflow-y: auto; padding: 24px; }

    /* Search */
    .search-box { padding: 16px; border-bottom: 1px solid var(--border); }
    .search-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-box input:focus { border-color: var(--accent); }
    .filter-row { display: flex; gap: 6px; margin-top: 8px; }
    .filter-btn { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text-muted); font-size: 11px; cursor: pointer; transition: all 0.15s; text-align: center; }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Device list */
    .device-list { flex: 1; overflow-y: auto; }
    .device-item { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    .device-item:hover { background: var(--surface2); }
    .device-item.selected { background: var(--surface2); border-left: 3px solid var(--accent); }
    .device-item-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .device-item-mfr { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .device-item-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .risk-badge { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
    .risk-HIGH { background: rgba(239,68,68,0.15); color: var(--red); }
    .risk-MEDIUM { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .risk-LOW { background: rgba(34,197,94,0.15); color: var(--green); }
    .score-pill { font-size: 11px; color: var(--text-muted); }
    .event-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }

    /* Detail panel */
    .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 14px; flex-direction: column; gap: 12px; }
    .detail-empty svg { opacity: 0.3; }

    .detail-header { margin-bottom: 24px; }
    .detail-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .detail-header .mfr-tag { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .detail-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 11px; color: var(--text-muted); }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .stat-red { color: var(--red); }
    .stat-yellow { color: var(--yellow); }
    .stat-green { color: var(--green); }
    .stat-blue { color: var(--accent); }

    /* Charts section */
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 1100px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .chart-card h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-wrap { position: relative; height: 200px; }

    /* Reliability meter */
    .reliability-meter { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .meter-label { font-size: 13px; color: var(--text-muted); min-width: 80px; }
    .meter-bar { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .meter-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
    .meter-score { font-size: 18px; font-weight: 700; min-width: 45px; text-align: right; }

    /* Failure modes */
    .failure-list { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 24px; }
    .failure-list h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .failure-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .failure-name { font-size: 12px; color: var(--text); min-width: 0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .failure-bar-wrap { width: 120px; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .failure-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; }
    .failure-pct { font-size: 11px; color: var(--text-muted); min-width: 36px; text-align: right; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab { padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; margin-bottom: -1px; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* No results */
    .no-results { padding: 32px; text-align: center; color: var(--text-muted); font-size: 13px; }
  </style>
</head>

<header>

</div>

let currentFilter = 'all';
let selectedId = null;

function filterDevices() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('deviceList');
  let filtered = DEVICES.filter(d => {
    const matchFilter = currentFilter === 'all' || d.riskTier === currentFilter;
    const matchQ = !q || d.name.toLowerCase().includes(q) || d.manufacturer.toLowerCase().includes(q) || (d.genericName || '').toLowerCase().includes(q);
    return matchFilter && matchQ;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">No devices match your search</div>';
    return;
  }

  list.innerHTML = filtered.map(d => `
    <div class="device-item ${d.id === selectedId ? 'selected' : ''}" onclick="selectDevice('${d.id}')">
      <div class="device-item-name" title="${escHtml(d.name)}">${escHtml(d.name)}</div>
      <div class="device-item-mfr">${escHtml(d.manufacturer)}</div>
      <div class="device-item-meta">
        <span class="risk-badge risk-${d.riskTier}">${d.riskTier}</span>
        <span class="score-pill">Score: ${d.reliabilityScore}</span>
        <span class="event-count">${fmtNum(d.eventCount12m)} events</span>
      </div>
    </div>
  `).join('');
}

function setFilter(f) {
  currentFilter = f;
  ['all','HIGH','MEDIUM','LOW'].forEach(k => {
    document.getElementById('filter' + (k === 'all' ? 'All' : k)).classList.toggle('active', k === f);
  });
  filterDevices();
}

function selectDevice(id) {
  selectedId = id;
  const dev = DEVICES.find(d => d.id === id);
  if (!dev) return;
  renderDetail(dev);
  filterDevices(); // refresh selection highlight
}

function renderDetail(dev) {
  const mfr = MANUFACTURERS.find(m => m.name === dev.manufacturer) || {};
  const scoreColor = dev.reliabilityScore >= 70 ? 'var(--green)' : dev.reliabilityScore >= 40 ? 'var(--yellow)' : 'var(--red)';

  const monthLabels = dev.monthlyEvents.map(m => m.month);
  const monthCounts = dev.monthlyEvents.map(m => m.count);

  document.getElementById('mainPanel').innerHTML = `
    <div class="detail-header">
      <h2>${escHtml(dev.name)}</h2>
      <div class="mfr-tag">${escHtml(dev.manufacturer)}</div>
      <div class="detail-badges">
        <span class="risk-badge risk-${dev.riskTier} tag">${dev.riskTier} RISK</span>
        ${dev.productCode ? `<span class="tag">Code: ${escHtml(dev.productCode)}</span>` : ''}
        ${dev.deviceClass ? `<span class="tag">Class ${escHtml(dev.deviceClass)}</span>` : ''}
        ${dev.medicalSpecialty ? `<span class="tag">${escHtml(dev.medicalSpecialty)}</span>` : ''}
      </div>
    </div>

    <!-- Reliability Meter -->
    <div class="reliability-meter">
      <div class="meter-label">Reliability</div>
      <div class="meter-bar"><div class="meter-fill" style="width:${dev.reliabilityScore}%; background:${scoreColor}"></div></div>
      <div class="meter-score" style="color:${scoreColor}">${dev.reliabilityScore}</div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Events</div>
        <div class="stat-value stat-blue">${fmtNum(dev.eventCount12m)}</div>
        <div class="stat-sub">2024–2026</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Deaths</div>
        <div class="stat-value ${dev.deathCount > 0 ? 'stat-red' : ''}">${fmtNum(dev.deathCount)}</div>
        <div class="stat-sub">${dev.pctDeath.toFixed(2)}% of events</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Injuries</div>
        <div class="stat-value ${dev.injuryCount > 0 ? 'stat-yellow' : ''}">${fmtNum(dev.injuryCount)}</div>
        <div class="stat-sub">${dev.pctInjury.toFixed(2)}% of events</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Malfunctions</div>
        <div class="stat-value stat-blue">${fmtNum(dev.malfunctionCount)}</div>
        <div class="stat-sub">${dev.pctMalfunction.toFixed(2)}% of events</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Recalls</div>
        <div class="stat-value ${dev.recallCount > 0 ? 'stat-red' : 'stat-green'}">${fmtNum(dev.recallCount)}</div>
        <div class="stat-sub">${dev.recallRate.toFixed(1)}% recall rate</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Severity Score</div>
        <div class="stat-value stat-yellow">${fmtNum(dev.severityScore)}</div>
        <div class="stat-sub">Weighted risk index</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Monthly Events Trend</h3>
        <div class="chart-wrap"><canvas id="chartMonthly"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Event Type Breakdown</h3>
        <div class="chart-wrap"><canvas id="chartBreakdown"></canvas></div>
      </div>
    </div>

    <!-- Failure Modes -->
    ${dev.failureModes.length > 0 ? `
    <div class="failure-list">
      <h3>Top Failure Modes</h3>
      ${dev.failureModes.map(fm => `
        <div class="failure-row">
          <div class="failure-name" title="${escHtml(fm.name)}">${escHtml(fm.name)}</div>
          <div class="failure-bar-wrap"><div class="failure-bar-fill" style="width:${Math.min(100, fm.pct * 3)}%"></div></div>
          <div class="failure-pct">${fm.pct}%</div>
        </div>
      `).join('')}
    </div>` : ''}
  `;

  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  // Monthly trend chart
  const ctxM = document.getElementById('chartMonthly');
  if (ctxM && monthLabels.length) {
    charts.monthly = new Chart(ctxM, {
      type: 'line',
      data: {
        labels: monthLabels,
        datasets: [{
          label: 'Events',
          data: monthCounts,
          borderColor: 'rgba(79,142,247,0.9)',
          backgroundColor: 'rgba(79,142,247,0.12)',
          fill: true,
          tension: 0.4,
          pointRadius: 3,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#7c8099', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#2e3347' } },
          y: { ticks: { color: '#7c8099', font: { size: 10 } }, grid: { color: '#2e3347' } }
        }
      }
    });
  }

  // Breakdown doughnut
  const ctxB = document.getElementById('chartBreakdown');
  if (ctxB) {
    charts.breakdown = new Chart(ctxB, {
      type: 'doughnut',
      data: {
        labels: ['Deaths', 'Injuries', 'Malfunctions', 'Other'],
        datasets: [{
          data: [dev.deathCount, dev.injuryCount, dev.malfunctionCount, dev.eventCount12m - dev.deathCount - dev.injuryCount - dev.malfunctionCount],
          backgroundColor: ['rgba(239,68,68,0.8)', 'rgba(245,158,11,0.8)', 'rgba(79,142,247,0.8)', 'rgba(124,128,153,0.4)'],
          borderColor: '#1a1d27',
          borderWidth: 2,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { color: '#7c8099', font: { size: 11 }, padding: 10 } }
        }
      }
    });
  }
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtNum(n) {
  return Number(n).toLocaleString();
}

// Initial render
filterDevices();
</script>
</body>
</html>
